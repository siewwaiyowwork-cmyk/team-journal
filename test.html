<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Activity Test</title>
  <style>
    body { background: #0a0a0f; color: #e0e0f0; font-family: sans-serif; padding: 20px; }
    .overview-card { background: var(--surface, #12121a); border-radius: 12px; padding: 16px; width: 300px; margin: 10px; }
    .activity-strip { display: flex; gap: 3px; margin: 10px 0; align-items: center; }
    .activity-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .activity-dot.active { background: #0f0; box-shadow: 0 0 6px rgba(0,230,118,.5); }
    .activity-dot.missing { background: rgba(255,23,68,.3); border: 2px solid #f00; animation: pulse 2s infinite; }
    .activity-label { font-size: .65em; color: #7a7a9a; margin-left: 6px; font-family: monospace; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .badge-grid { display: flex; flex-wrap: wrap; gap: 4px; margin: 10px 0; }
  </style>
</head>
<body>
<div id="grid"></div>
<script>
const members = [
  {name: 'Test', activity: [
    {date: '2026-05-08', active: true},
    {date: '2026-05-07', active: true},
    {date: '2026-05-06', active: false}
  ]}
];

const grid = document.getElementById('grid');
grid.innerHTML = members.map(m => {
  let activityHtml = '';
  if(m.activity && m.activity.length){
    const dots = m.activity.map(function(day){
      return '<span class="activity-dot ' + (day.active ? 'active' : 'missing') + '" title="' + day.date + '"  ></span>';
    }).join('');
    const activeCount = m.activity.filter(function(d){ return d.active; }).length;
    activityHtml = '<div class="activity-strip">' + dots + '<span class="activity-label">' + activeCount + '/10 days</span></div>';
  }
  return '<div class="overview-card"><h3>' + m.name + '</h3><div class="badge-grid">' + activityHtml + '</div></div>';
}).join('');

console.log('Rendered:', grid.innerHTML.substring(0, 500));
</script>
</body>
</html>
